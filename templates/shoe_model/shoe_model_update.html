{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 900px;">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white py-3">
            <h4 class="mb-0 text-white">
                <i class="bx bx-edit-alt me-2"></i>{{UPDATE}} — {{SHOE_MODEL}}
            </h4>
            <small class="text-white-50">{{shoe_model_item.name}} ({{shoe_model_item.code}})</small>
        </div>
        <div class="card-body p-4">
            {% include "shoe_model/_shoe_model_form.html" with form=forms cancel_url=cancel_url %}
        </div>
    </div>
</div>
{% endblock content %}
