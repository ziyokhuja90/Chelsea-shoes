{% extends "base.html" %}

{% block content %}

<div class="container mt-3">
    <form method="post">
    <div class="card shadow-sm">
        <div class="card-header bg-info ">
            <h3 class="mb-0 text-white">{{CREATE}}</h3>
        </div>
        <div class="card-body">
                {% csrf_token %}
                
                <div class="row">
                    <div class="col-md-3">
                        <label>{{ forms.model_id.label }}</label>
                        {{ forms.model_id }}
                    </div>

                    <div class="col-md-3">
                        <label>{{ forms.quantity.label }}</label>
                        {{ forms.quantity }}
                    </div>

                    <div class="col-md-3">
                        <label>{{ forms.quantity_type_id.label }}</label>
                        {{ forms.quantity_type_id }}
                    </div>

                    <div class="col-md-3">
                        <label>{{ forms.price.label }}</label>
                        {{ forms.price }}
                    </div>
                    {% if messages %}
                    <ul>
                        {% for message in messages %}
                            <li style="color: red;">
                                {{ message }}
                            </li>
                        {% endfor %}
                    </ul>
                {% endif %}
                </div>
                
                <div class="d-flex gap-3 align-items-center justify-content-end mt-4">
                    <a href="" class="btn btn-secondary">{{CANCEL}}</a>
                    <button type="submit" class="btn btn-primary">{{SAVE}}</button>
                </div>
            </div>
        </div>
        
        <div id="parts-container" class="mt-4">
            <!-- Bu yerga modelga tegishli qismlar yuklanadi -->
        </div>
    </form>
</div>


<script>
function orderQuantityValue() {
    const input = document.querySelector('input[name="quantity"]');
    return input && input.value !== "" ? input.value : "0";
}

function checkStock(partId) {

    let variant = document.querySelector(
        `[name="parts[${partId}][material_variant_id]"]`
    ).value;

    let colorEl = document.querySelector(
        `[name="parts[${partId}][color_id]"]`
    );

    let color = colorEl ? colorEl.value : "";

    let materialType = document.querySelector(
        `[name="parts[${partId}][material_type_id]"]`
    ).value;

    if (!variant) return;

    const orderQty = encodeURIComponent(orderQuantityValue());
    const qs =
        `material_type=${encodeURIComponent(materialType)}` +
        `&variant=${encodeURIComponent(variant)}` +
        `&color=${encodeURIComponent(color)}` +
        `&order_quantity=${orderQty}` +
        `&model_part_definition_id=${encodeURIComponent(partId)}`;

    fetch(`/get-material-stock/?${qs}`)
        .then(res => res.json())
        .then(data => {

            let el = document.getElementById(`stock-info-${partId}`);

            if (data.required_error) {
                el.innerText = data.required_error;
                el.style.color = "red";
                return;
            }

            if (data.error) {
                el.innerText = "Topilmadi";
                el.style.color = "red";
                return;
            }

            let text = `Mavjud: ${data.available}`;
            if (data.required != null) {
                text += ` | Chiqindi ${data.waste_percent}% bilan kerak: ${data.required.toFixed(2)}`;
            }
            el.innerText = text;
            if (data.required != null) {
                el.style.color = data.sufficient ? "green" : "red";
            } else {
                el.style.color = data.available > 0 ? "green" : "red";
            }

        });
}

function refreshAllPartStock() {
    document.querySelectorAll('select[name*="[material_variant_id]"]').forEach(sel => {
        const match = sel.name.match(/^parts\[(\d+)\]/);
        if (match && sel.value) checkStock(match[1]);
    });
}

document.addEventListener("DOMContentLoaded", function () {
    const qtyInput = document.querySelector('input[name="quantity"]');
    if (qtyInput) {
        qtyInput.addEventListener("input", refreshAllPartStock);
        qtyInput.addEventListener("change", refreshAllPartStock);
    }
});
</script>

<script>

function renderParts(parts) {

    const container =
        document.getElementById("parts-container");

    let html = `
        <div class="card mt-3">
            <div class="card-header fw-bold">
                Model qismlari
            </div>
            <div class="card-body">
    `;

    parts.forEach(part => {

        // VARIANT OPTIONS

        let variantOptions =
            `<option value="">Tanlang</option>`;

        part.variants.forEach(v => {

            variantOptions += `
                <option value="${v.id}">
                    ${v.value}
                </option>
            `;

        });

        // COLOR OPTIONS

        let colorOptions =
            `<option value="">Ixtiyoriy</option>`;

        part.colors.forEach(c => {

            colorOptions += `
                <option value="${c.id}">
                    ${c.value}
                </option>
            `;

        });

        html += `
            <div class="row mb-2 align-items-center">

                <div class="col-md-3">

                    ${part.part_name}

                    <input
                        type="hidden"
                        name="parts[${part.id}][model_part_definition_id]"
                        value="${part.id}"
                    >

                </div>

                <div class="col-md-3">
                    ${part.material_type} ${part.material_type_id}
                        <input
                            type="hidden"
                            name="parts[${part.id}][material_type_id]"
                            value="${part.material_type_id}"
                        >
                </div>

                <div class="col-md-3">
                    <label>{{VARIANT_TYPE}}</label>
                    <select
                        name="parts[${part.id}][material_variant_id]"
                        class="form-control"
                        onchange="checkStock(${part.id})"
                    >
                        ${variantOptions}
                    </select>

                </div>

                <div class="col-md-3">

                    <label>{{COLOR}}</label>
                    <select
                        name="parts[${part.id}][color_id]"
                        class="form-control"
                        onchange="checkStock(${part.id})"
                    >
                        ${colorOptions}
                    </select>

                </div>
                <div class="col-md-12 mt-1">
                    <small class="text-muted">Juftiga: ${part.quantity_per_pair}, chiqindi: ${part.waste_percent}%</small><br>
                    <small id="stock-info-${part.id}" style="color: gray;">
                        Stock: -
                    </small>
                </div>

            </div>
        `;

    });

    html += `
            </div>
        </div>
    `;

    container.innerHTML = html;

}


function loadParts(modelId) {

    if (!modelId) return;

    fetch(`/orders/get-model-parts/${modelId}`)
        .then(response => response.json())
        .then(data => {

            console.log(data);

            // keyin shu yerda form render qilasan
            // masalan:
            renderParts(data);
            refreshAllPartStock();

        })
        .catch(error => console.error(error));

}

</script>

{% endblock content %}
